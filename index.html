<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mappa Competenze — Sardegna</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/d3/7.8.5/d3.min.js"></script>
<style>
html{height:100%;}
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'Segoe UI',system-ui,sans-serif;background:#f4f3f0;color:#1a1a1a;height:100%;max-height:100vh;overflow:hidden;display:flex;flex-direction:column;}
#topbar{background:#1a1a2e;color:#fff;padding:10px 20px;display:flex;align-items:center;gap:16px;flex-shrink:0;box-shadow:0 2px 8px rgba(0,0,0,.25);z-index:10;}
#topbar h1{font-size:13px;font-weight:600;letter-spacing:.04em;text-transform:uppercase;opacity:.9;white-space:nowrap;}
#comune-sw{position:relative;flex:0 0 220px;}
#comune-search{width:100%;padding:7px 30px 7px 12px;font-size:13px;border:none;border-radius:6px;background:rgba(255,255,255,.12);color:#fff;outline:none;}
#comune-search::placeholder{color:rgba(255,255,255,.45);}
#comune-search:focus{background:rgba(255,255,255,.2);}
#comune-clear{position:absolute;right:8px;top:50%;transform:translateY(-50%);background:none;border:none;cursor:pointer;font-size:13px;color:rgba(255,255,255,.6);display:none;padding:0;}
#comune-sugg{position:absolute;top:calc(100% + 4px);left:0;right:0;background:#fff;border-radius:6px;z-index:200;max-height:200px;overflow-y:auto;display:none;box-shadow:0 6px 20px rgba(0,0,0,.18);}
.sug-item{padding:7px 12px;cursor:pointer;font-size:13px;color:#1a1a1a;border-bottom:1px solid #f0f0f0;display:flex;align-items:center;gap:8px;}
.sug-item:hover{background:#f5f5f5;}
.sug-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0;}
#route-badge{display:flex;align-items:center;gap:10px;}
#comune-badge{font-size:12px;font-weight:600;padding:3px 12px;border-radius:20px;background:#D63384;color:#fff;display:none;white-space:nowrap;}
#route-info{font-size:13px;color:rgba(255,255,255,.85);white-space:nowrap;}
#route-info strong{color:#fff;font-weight:700;}
#main{display:flex;flex:1;overflow:hidden;min-height:0;}
#sidebar-left{width:215px;flex-shrink:0;background:#fff;border-right:1px solid #e8e6e0;padding:12px 11px;display:flex;flex-direction:column;gap:8px;overflow:hidden;}
.sec-title{font-size:10px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;color:#888;}
#mat-wrap{position:relative;}
#mat-input{width:100%;padding:8px 30px 8px 10px;font-size:12px;border:1px solid #ddd;border-radius:6px;background:#fafafa;color:#1a1a1a;outline:none;transition:border-color .15s;}
#mat-input:focus{border-color:#1a1a2e;background:#fff;}
#mat-input::placeholder{color:#aaa;}
#mat-clear{position:absolute;right:7px;top:50%;transform:translateY(-50%);background:none;border:none;cursor:pointer;font-size:12px;color:#aaa;display:none;padding:0;}
#mat-dropdown{position:absolute;top:calc(100% + 3px);left:0;right:0;background:#fff;border:1px solid #ddd;border-radius:6px;z-index:400;max-height:200px;overflow-y:auto;display:none;box-shadow:0 4px 16px rgba(0,0,0,.13);}
.mat-opt{padding:8px 10px;cursor:pointer;font-size:12px;color:#1a1a1a;border-bottom:1px solid #f5f5f5;user-select:none;display:flex;align-items:center;gap:8px;}
.mat-opt:hover{background:#f5f5f5;}
.mat-opt.selected{font-weight:600;}
.mat-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0;}
#sel-mat-badge{background:#f0f4ff;border:1px solid #c7d9ff;border-radius:5px;padding:4px 8px;font-size:11px;font-weight:600;color:#1a1a2e;display:flex;align-items:center;gap:6px;}
#sel-mat-badge.hidden{display:none!important;}
#sel-mat-dot{width:10px;height:10px;border-radius:50%;flex-shrink:0;}
#sel-mat-x{background:none;border:none;cursor:pointer;font-size:12px;color:#888;padding:0;margin-left:auto;}
#forn-header{font-size:10px;color:#aaa;display:none;justify-content:space-between;align-items:center;padding:0 2px;}
#forn-count{font-weight:600;color:#555;}
#forn-list{flex:1;overflow-y:auto;display:flex;flex-direction:column;gap:4px;}
.f-empty{font-size:11px;color:#bbb;text-align:center;padding:24px 8px;line-height:1.8;}
.f-card{border:1px solid #eee;border-radius:5px;padding:5px 8px;cursor:pointer;transition:border-color .12s,background .12s;display:flex;align-items:center;gap:7px;background:#f8f8f6;}
.f-card:hover{border-color:#bbb;background:#f3f3f0;}
.f-card.highlighted{background:#f0fdf4;}
.f-bar{width:4px;border-radius:2px;align-self:stretch;flex-shrink:0;}
.f-body{flex:1;min-width:0;}
.f-name{font-weight:600;font-size:10.5px;color:#1a1a2e;white-space:normal;line-height:1.3;word-break:break-word;}
.f-comune{font-size:9.5px;color:#888;}
.f-price{font-size:10px;font-weight:600;padding:1px 6px;border-radius:8px;white-space:nowrap;flex-shrink:0;}
.f-dist{font-size:9px;color:#6e7681;margin-top:1px;}
#map-wrap{flex:1;min-width:0;min-height:0;overflow:hidden;position:relative;}
#map{display:block;}
#hover-tooltip{position:fixed;background:#1a1a2e;color:#fff;font-size:11px;font-weight:500;padding:4px 9px;border-radius:4px;pointer-events:none;display:none;z-index:500;white-space:nowrap;box-shadow:0 2px 8px rgba(0,0,0,.2);}
#hover-tooltip::after{content:'';position:absolute;top:100%;left:10px;border:4px solid transparent;border-top-color:#1a1a2e;}
#sidebar-right{width:215px;flex-shrink:0;background:#fff;border-left:1px solid #e8e6e0;padding:12px 11px;overflow-y:auto;display:flex;flex-direction:column;}
#sidebar-right h2{font-size:10px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;color:#888;margin-bottom:8px;}
.leg-az{margin-bottom:10px;}
.leg-az-name{font-size:10.5px;font-weight:600;color:#1a1a2e;margin-bottom:4px;padding-bottom:3px;border-bottom:1px solid #f0f0f0;}
.leg-item{display:flex;align-items:center;gap:6px;margin-bottom:4px;padding-left:2px;}
.leg-sw{width:10px;height:10px;border-radius:2px;flex-shrink:0;}
.leg-pin{width:10px;height:13px;flex-shrink:0;}
.leg-lbl{font-size:10px;color:#555;line-height:1.3;}
.leg-div{border:none;border-top:1px solid #eee;margin:6px 0;}
#tip-sidebar{margin-top:auto;padding-top:8px;border-top:1px solid #eee;font-size:10px;color:#999;line-height:1.5;}
#status-bar{font-size:11px;color:#888;text-align:center;padding:2px;flex-shrink:0;}
@media(max-width:680px){#sidebar-left,#sidebar-right{display:none;}#topbar h1{display:none;}#comune-sw{flex:1 1 auto;}#topbar{gap:8px;padding:8px 10px;}}
</style>
</head>

<div id="topbar">
  <h1>Mappa Competenze &middot; Sardegna</h1>
  <div id="comune-sw">
    <input id="comune-search" type="text" placeholder="Cerca comune&hellip;" autocomplete="off">

    <div id="hover-tooltip"></div>

    <div class="leg-div"></div>

    <div id="legend-products"></div>
    <div class="leg-div"></div>
    <div id="tip-sidebar">Hover su comune. Click per percorso da Santa Giusta.</div>
  </div>
</div>

function norm(s){return s?s.trim().normalize("NFD").replace(/[\u0300-\u036f]/g,"").toLowerCase().replace(/['\u2018\u2019\u0060]/g,""):""; }
const uN=UNITS.map(u=>({...u,ns:new Set([...u.comuni].map(norm))}));
function getUnit(n){const nn=norm(n);return uN.find(u=>u.ns.has(nn))||null;}
function getDist(comune,fornComune){
  const nn=comune?comune.trim():"";
  const fc=fornComune?fornComune.toUpperCase().replace(/[\u2019']/g,"'"):"";
  const row=DIST_DATA[nn]||DIST_DATA[Object.keys(DIST_DATA).find(k=>norm(k)===norm(nn))||""]||{};
  return row[fc]||null;
}
function fmtDist(d){
  if(!d)return"";
  const h=Math.floor(d.dur*1.15/3600),m=Math.round((d.dur*1.15%3600)/60);
  const t=h>0?h+"h "+m+"min":m+"min";
  return d.dist+"km · "+t;
}
function fmtDur(s){s=Math.round(s*1.15);const h=Math.floor(s/3600),m=Math.round((s%3600)/60);return h>0?h+"h "+m+"min":m+" min";}
function getRoute(n){const d=ROUTE_DATA[n];if(d)return d;const nn=norm(n);const f=Object.entries(ROUTE_DATA).find(([k])=>norm(k)===nn);return f?f[1]:null;}
function getRouteF(c){const k=c.toUpperCase().replace(/['\u2019]/g,"'");const ex=EXTRA_ROUTES[k];if(ex)return ex;const nn=norm(c);const f=Object.entries(ROUTE_DATA).find(([k2])=>norm(k2)===nn);return f?f[1]:null;}

function openDD(filter){
  const items=filter?allProd.filter(p=>norm(p).includes(norm(filter))):allProd;
  if(!items.length){matDD.style.display="none";return;}
  matDD.innerHTML=items.map(p=>{
    const c=pCol(p);
    return '<div class="mat-opt'+(selMat===p?" selected":"")+'" data-prod="'+p.replace(/"/g,"&quot;")+'"><span class="mat-dot" style="background:'+c.bg+'"></span>'+p+'</div>';
  }).join("");
  matDD.querySelectorAll(".mat-opt").forEach(el=>{
    el.addEventListener("mousedown",function(e){e.preventDefault();selMateriale(this.getAttribute("data-prod"));});
  });
  matDD.style.display="block";
}
function closeDD(){matDD.style.display="none";}

matInput.addEventListener("focus",()=>openDD(matInput.value));
matInput.addEventListener("input",()=>{matClear.style.display=matInput.value?"block":"none";openDD(matInput.value);});
matInput.addEventListener("blur",()=>setTimeout(closeDD,200));
matInput.addEventListener("keydown",e=>{
  if(e.key==="Escape"){clearMat();closeDD();}
  if(e.key==="Enter"){const f=allProd.find(p=>norm(p).includes(norm(matInput.value)));if(f)selMateriale(f);}
});

function selMateriale(prod){
  selMat=prod;
  matInput.value="";matClear.style.display="none";closeDD();
  const c=pCol(prod);
  selDot.style.background=c.bg;
  selLabel.textContent=prod;
  selBadge.classList.remove("hidden");
  renderFornitori(prod);
  drawPins(prod);
}

function renderFornitori(prod){
  const list=FORNITORI_RAW.filter(f=>f.prodotto===prod).sort((a,b)=>a.fornitore.localeCompare(b.fornitore));
  fornCount.textContent=list.length;
  fornHeader.style.display="flex";
  if(!list.length){fornList.innerHTML='<div class="f-empty">Nessun fornitore</div>';return;}
  const c=pCol(prod);
  fornList.innerHTML=list.map((f,i)=>{
    const baseComune=sel||"Santa Giusta";
    const di=getDist(baseComune,f.comune);
    const distHtml=di?'<div class="f-dist">'+fmtDist(di)+'</div>':"";

      hoverTip.style.display="block";
      hoverTip.style.left=(ev.clientX+12)+"px";
      hoverTip.style.top=(ev.clientY-32)+"px";
      hoverTip.textContent=fullNames+" \u2014 "+comune+(prezzo?" \u2014 "+prezzo:"");
    }).on("mouseleave",()=>hoverTip.style.display="none");
  });

  // Collision avoidance: sposta label sovrapposte (multi-passaggio, usa DOM reale)
  (function(){
    const nodes=svg.selectAll(".f-pin").nodes();
    if(nodes.length<2)return;
    const items=nodes.map(el=>{
      const t=el.getAttribute("transform")||"";
      const m=t.match(/translate\(([^,]+),([^)]+)\)/);
      const px=m?+m[1]:0,py=m?+m[2]:0;
      const rect=el.querySelector("rect"),txt=el.querySelector("text");
      if(!rect||!txt)return null;
      return{el,rect,txt,px,py,
        rx:parseFloat(rect.getAttribute("x"))||6,
        ry:parseFloat(rect.getAttribute("y"))||-21,
        rw:parseFloat(rect.getAttribute("width"))||80,
        rh:parseFloat(rect.getAttribute("height"))||14,
        ty:parseFloat(txt.getAttribute("y"))||-11,
        dy:0};
    }).filter(Boolean);
    const PAD=4;
    for(let pass=0;pass<8;pass++){
      let moved=false;
      for(let i=0;i<items.length;i++){
        for(let j=i+1;j<items.length;j++){
          const a=items[i],b=items[j];
          const ax1=a.px+a.rx,ay1=a.py+a.ry+a.dy,ax2=ax1+a.rw,ay2=ay1+a.rh;
          const bx1=b.px+b.rx,by1=b.py+b.ry+b.dy,bx2=bx1+b.rw,by2=by1+b.rh;
          if(ax1<bx2+PAD&&ax2+PAD>bx1&&ay1<by2+PAD&&ay2+PAD>by1){
            const ov=Math.min(ay2,by2)-Math.max(ay1,by1)+PAD;
            if(a.py>=b.py)a.dy+=ov; else b.dy+=ov;
            moved=true;
          }
        }
      }
      if(!moved)break;
    }
    items.forEach(it=>{
      if(Math.abs(it.dy)<0.5)return;
      it.rect.setAttribute("y",it.ry+it.dy);
      it.txt.setAttribute("y",it.ty+it.dy);
    });
  })();
}

// Mappa comuni
const svg=d3.select("#map");
const miniSvg=d3.select("#minimap");
const hoverTip=document.getElementById("hover-tooltip");
const comuneEl=document.getElementById("comune-search");
const comuneSugg=document.getElementById("comune-sugg");
const comuneBadge=document.getElementById("comune-badge");
const routeInfo=document.getElementById("route-info");
const comuneClear=document.getElementById("comune-clear");
const tipSidebar=document.getElementById("tip-sidebar");
const statusBar=document.getElementById("status-bar");

let allNames=[],sel=null,pathSel=null,projFn=null,gjCache=null;
function gn(d){return d.properties.name||d.properties.COMUNE||d.properties.comune||"";}
function gf(n,s){if(s&&norm(n)===norm(s))return SC;const u=getUnit(n);return u?u.color:"#C8C6BE";}
function gs(n,s){if(s&&norm(n)===norm(s))return SS;const u=getUnit(n);return u?u.stroke:"#bbb";}
function gw(n,s){return(s&&norm(n)===norm(s))?2:0.4;}
function applyC(){if(!pathSel)return;pathSel.attr("fill",d=>gf(gn(d),sel)).attr("stroke",d=>gs(gn(d),sel)).attr("stroke-width",d=>gw(gn(d),sel));}

function cleanGJ(gj){
  return {type:"FeatureCollection",features:gj.features.map(f=>{
    if(f.geometry.type!=="MultiPolygon"||f.geometry.coordinates.length<=1)return f;
    const ps=f.geometry.coordinates;
    const mx=Math.max(...ps.map(p=>p[0].length));
    const thr=Math.max(8,mx*0.05);
    const filt=ps.filter(p=>p[0].length>=thr);
    if(!filt.length)return f;
    return {...f,geometry:{...f.geometry,type:filt.length===1?"Polygon":"MultiPolygon",coordinates:filt.length===1?filt[0]:filt}};
  })};
}

function drawSede(){
  svg.selectAll(".sede").remove();if(!projFn)return;
  const [px,py]=projFn(SEDE_COORDS);
  const g=svg.append("g").attr("class","sede").attr("transform","translate("+px+","+py+")").style("pointer-events","none");
  g.append("ellipse").attr("cx",0).attr("cy",2).attr("rx",5).attr("ry",2.5).attr("fill","rgba(0,0,0,0.2)");
  g.append("path").attr("d","M0,-20 C-6,-20 -6,-11 -6,-9 C-6,-3 0,0 0,0 C0,0 6,-3 6,-9 C6,-11 6,-20 0,-20 Z").attr("fill","#1a1a2e").attr("stroke","#fff").attr("stroke-width","1.5");
  g.append("circle").attr("cx",0).attr("cy",-12).attr("r",3.5).attr("fill","white");
}

function drawRoute(routeCoords,comuneName){
  svg.selectAll(".route").remove();
  if(!projFn||!routeCoords||!routeCoords.length)return;
  const nn=norm(comuneName);
  const centroidi=window._centroidi||{};
  const dest=centroidi[nn];
  const projected=routeCoords.map(function(c){return projFn([c[0],c[1]]);});
  function applyPath(pathD){
    var attrs=function(el){return el.attr("class","route").attr("d",pathD).attr("fill","none").attr("stroke-linecap","round");};
    attrs(svg.insert("path",".sede")).attr("stroke","rgba(0,0,0,0.12)").attr("stroke-width",5);
    attrs(svg.insert("path",".sede")).attr("stroke","#2563EB").attr("stroke-width",2.8).attr("stroke-dasharray","8,5");
  }
  if(!dest||projected.length<3){applyPath(d3.line().x(function(d){return d[0];}).y(function(d){return d[1];})(projected));return;}
  var dp=projFn(dest);var dx=dp[0];var dy=dp[1];
  var closestIdx=projected.length-1;var minDist=Infinity;
  for(var k=0;k<projected.length;k++){
    var dd=Math.sqrt(Math.pow(projected[k][0]-dx,2)+Math.pow(projected[k][1]-dy,2));
    if(dd<minDist){minDist=dd;closestIdx=k;}
  }
  var trimmed=projected.slice(0,closestIdx+1);
  if(trimmed.length<2){applyPath("M"+projected[0][0]+","+projected[0][1]+" L"+dx+","+dy);return;}
  var BLEND=Math.min(20,Math.floor(trimmed.length*0.05)+2);
  var cutoff=Math.max(1,trimmed.length-BLEND);
  var main=trimmed.slice(0,cutoff);
  var ctrl=trimmed[trimmed.length-1];
  var pathD=d3.line().x(function(d){return d[0];}).y(function(d){return d[1];})(main);
  pathD+=" Q"+ctrl[0]+","+ctrl[1]+" "+dx+","+dy;
  applyPath(pathD);
}

function selComune(name){
  sel=name;applyC();
  if(pathSel)pathSel.filter(d=>norm(gn(d))===norm(name||"")).raise();
  svg.selectAll(".route").remove();drawSede();
  const u=getUnit(name);
  comuneBadge.textContent=name+(u?" \u00b7 "+u.bt:"");
  comuneBadge.style.display=name?"inline":"none";
  const r=getRoute(name);
  if(r){routeInfo.innerHTML="<strong>"+r.dist+" km</strong> &nbsp;\u00b7&nbsp; <strong>"+fmtDur(r.dur)+"</strong>";drawRoute(r.coords,name);drawSede();}
  else routeInfo.innerHTML='<span style="opacity:.4;font-size:11px">n/d</span>';
  if(selMat){renderFornitori(selMat);drawPins(selMat);}
}

window.clearComune=function(){
  sel=null;comuneBadge.style.display="none";routeInfo.textContent="";
  comuneEl.value="";comuneClear.style.display="none";comuneSugg.style.display="none";
  applyC();svg.selectAll(".route").remove();drawSede();
  if(selMat){renderFornitori(selMat);drawPins(selMat);}
};

function showSugg(q){
  const qn=norm(q);if(!qn){comuneSugg.style.display="none";return;}
  const m=allNames.filter(n=>norm(n).includes(qn)).slice(0,8);
  if(!m.length){comuneSugg.style.display="none";return;}
  comuneSugg.innerHTML=m.map(n=>{const u=getUnit(n);return'<div class="sug-item" data-name="'+n.replace(/"/g,"&quot;")+'"><span class="sug-dot" style="background:'+(u?u.color:"#bbb")+'"></span>'+n+'</div>';}).join("");
  comuneSugg.querySelectorAll(".sug-item").forEach(el=>{el.addEventListener("mousedown",function(e){e.preventDefault();pickComune(this.getAttribute("data-name"));});});
  comuneSugg.style.display="block";
}
function pickComune(n){comuneEl.value=n;comuneSugg.style.display="none";comuneClear.style.display="block";selComune(n);}
comuneEl.addEventListener("input",e=>{const v=e.target.value;comuneClear.style.display=v?"block":"none";showSugg(v);if(!v){sel=null;comuneBadge.style.display="none";routeInfo.textContent="";applyC();svg.selectAll(".route").remove();drawSede();}});
comuneEl.addEventListener("blur",()=>setTimeout(()=>comuneSugg.style.display="none",200));
comuneEl.addEventListener("keydown",e=>{if(e.key==="Escape")clearComune();if(e.key==="Enter"){const q=norm(comuneEl.value);const m=allNames.find(n=>norm(n)===q)||allNames.find(n=>norm(n).startsWith(q));if(m)pickComune(m);}});

function getMapSize(){
  const w=document.getElementById("map-wrap");
  const W=w.offsetWidth||w.getBoundingClientRect().width||300;
  const H=w.offsetHeight||w.getBoundingClientRect().height||400;
  return [Math.round(Math.max(W,100)),Math.round(Math.max(H,100))];
}

function render(gj){
  gj=cleanGJ(gj);
  const [W,H]=getMapSize();
  if(W<50||H<50){requestAnimationFrame(()=>render(gj));return;}
  svg.attr("width",W).attr("height",H);
  svg.selectAll("*").remove();
  allNames=gj.features.map(gn).filter(Boolean).sort();
  const assigned=gj.features.filter(f=>getUnit(gn(f))!==null);
  const zoomColl={type:"FeatureCollection",features:assigned.length?assigned:gj.features};
  const pad=24;
  const proj=d3.geoMercator().fitExtent([[pad,pad],[W-pad,H-pad]],zoomColl);
  const t=proj.translate();
  proj.translate([t[0]-90,t[1]]);
  projFn=proj;
  const path=d3.geoPath(proj);
  const centroidi={};
  gj.features.forEach(f=>{
    const n=norm(gn(f));if(!n)return;
    const coords=[];
    const geom=f.geometry;
    const collect=ring=>ring.forEach(([a,b])=>coords.push([a,b]));
    if(geom.type==="Polygon")geom.coordinates.forEach(collect);
    else if(geom.type==="MultiPolygon")geom.coordinates.forEach(p=>p.forEach(collect));
    if(coords.length)centroidi[n]=[coords.reduce((s,c)=>s+c[0],0)/coords.length,coords.reduce((s,c)=>s+c[1],0)/coords.length];
  });
  window._centroidi=centroidi;
  try{localStorage.setItem('sardegna_centroidi',JSON.stringify(centroidi));}catch(e){}

  pathSel=svg.selectAll("path.comune").data(gj.features).join("path")
    .attr("class","comune").attr("d",path)
    .attr("fill",d=>gf(gn(d),null)).attr("stroke",d=>gs(gn(d),null)).attr("stroke-width",0.4)
    .on("mousemove",function(ev,d){
      const n=gn(d),u=getUnit(n);
      hoverTip.style.display="block";hoverTip.style.left=(ev.clientX+14)+"px";hoverTip.style.top=(ev.clientY-34)+"px";hoverTip.textContent=n;
      tipSidebar.innerHTML=u?"<strong>"+n+"</strong><br><span style=\"color:"+u.color+"\">"+u.azienda+"</span><br><small>"+u.bt+"</small>":"<strong>"+n+"</strong><br><span style=\"color:#999\">Non assegnato</span>";
      if(norm(n)!==norm(sel||""))d3.select(this).attr("stroke-width",1.2).attr("stroke","#333");
    })
    .on("mouseleave",function(ev,d){
      const n=gn(d);hoverTip.style.display="none";
      tipSidebar.textContent="Hover su comune. Click per percorso.";
      d3.select(this).attr("stroke-width",gw(n,sel)).attr("stroke",gs(n,sel));
    })
    .on("click",function(ev,d){
      const n=gn(d);
      if(norm(n)===norm(sel||"")){clearComune();return;}
      comuneEl.value=n;comuneClear.style.display="block";selComune(n);
    });
  drawSede();
  // Minimap
  miniSvg.selectAll("*").remove();
  const mp=d3.geoMercator().fitExtent([[4,4],[193,248]],gj);
  const mpath=d3.geoPath(mp);
  miniSvg.selectAll("path").data(gj.features).join("path").attr("d",mpath)
    .attr("fill",d=>{const u=getUnit(gn(d));return u?u.color:"#D8D6CD";})
    .attr("stroke","rgba(255,255,255,0.4)").attr("stroke-width","0.3");
  const [mx,my]=mp(SEDE_COORDS);
  miniSvg.append("circle").attr("cx",mx).attr("cy",my).attr("r",2.5).attr("fill","#1a1a2e").attr("stroke","white").attr("stroke-width","0.8");
  const bb=zoomColl;
  let mn_x=Infinity,mx_x=-Infinity,mn_y=Infinity,mx_y=-Infinity;
  assigned.forEach(f=>{
    const b=path.bounds(f);
    mn_x=Math.min(mn_x,b[0][0]);mx_x=Math.max(mx_x,b[1][0]);
    mn_y=Math.min(mn_y,b[0][1]);mx_y=Math.max(mx_y,b[1][1]);
  });
  // draw zoom rect on minimap using minimap coords
  const corners=[[assigned[0]]]; // approximation via bbox from main
  // Use bbox in geo coords from zoomColl features
  let glng0=Infinity,glat0=Infinity,glng1=-Infinity,glat1=-Infinity;
  assigned.forEach(f=>{
    const coords_list=f.geometry.type==="Polygon"?f.geometry.coordinates:f.geometry.coordinates.flat();
    coords_list.forEach(ring=>ring.forEach(([lng,lat])=>{
      glng0=Math.min(glng0,lng);glat0=Math.min(glat0,lat);
      glng1=Math.max(glng1,lng);glat1=Math.max(glat1,lat);
    }));
  });
  const c1=mp([glng0,glat0]),c2=mp([glng1,glat1]);
  const rx=Math.min(c1[0],c2[0]),ry=Math.min(c1[1],c2[1]),rw=Math.abs(c2[0]-c1[0]),rh=Math.abs(c2[1]-c1[1]);
  miniSvg.append("rect").attr("x",rx).attr("y",ry).attr("width",rw).attr("height",rh)
    .attr("fill","none").attr("stroke","#2563EB").attr("stroke-width","1.2").attr("stroke-dasharray","3,2").attr("rx","1");
}

let resizeTimer=null;
function safeRender(gj){requestAnimationFrame(()=>requestAnimationFrame(()=>render(gj)));}
window.addEventListener("resize",()=>{clearTimeout(resizeTimer);resizeTimer=setTimeout(()=>{if(gjCache)safeRender(gjCache);},250);});

const sources=["https://cdn.jsdelivr.net/gh/openpolis/geojson-italy@2023.1/geojson/limits_R_20_municipalities.geojson","https://unpkg.com/geojson-italy@1.0.0/geojson/limits_R_20_municipalities.geojson"];
async function tryLoad(){
  for(const url of sources){
    try{
      statusBar.textContent="Caricamento mappa\u2026";
      const r=await fetch(url);if(!r.ok)continue;
      gjCache=await r.json();safeRender(gjCache);statusBar.textContent="";return;
    }catch(e){continue;}
  }
  statusBar.textContent="Errore caricamento dati geografici.";
}
tryLoad();
</script>
